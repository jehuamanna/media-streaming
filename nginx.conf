load_module /usr/lib/nginx/modules/ngx_rtmp_module.so;

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

rtmp {
    server {
        listen 1935;
        chunk_size 4096;

        application live {
            live on;
            record off;
            hls on;
            hls_path /var/hls/live;
            hls_nested on;
            hls_fragment 3;
            hls_playlist_length 60;
        }
    }
}

http {
    access_log off;
    server {
        listen 127.0.0.1:8099;
        location /health {
            return 204;
        }
    }
}
